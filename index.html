<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialFin Creative OS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a16;
    --bg2:      #0d0d1e;
    --bg3:      #111128;
    --border:   #1e1e36;
    --border2:  #2a2a4a;
    --text:     #ccccee;
    --muted:    #555577;
    --dim:      #333355;
    --purple:   #7b61ff;
    --gold:     #ffb400;
    --green:    #00c896;
    --red:      #ff4d4d;
    --orange:   #f5a623;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── APP SHELL ── */
  #app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── TOP NAV ── */
  #top-nav {
    background: linear-gradient(135deg, #0d0d20 0%, #0a0a16 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: stretch;
    gap: 0;
    flex-shrink: 0;
  }

  .nav-brand {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 24px 16px 0;
    border-right: 1px solid var(--border);
    margin-right: 20px;
  }
  .nav-brand-sub { font-size: 9px; color: #444466; letter-spacing: 3px; margin-bottom: 4px; }
  .nav-brand-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
  .nav-brand-title span { color: var(--purple); }

  .nav-tab {
    background: none;
    border: none;
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    align-self: stretch;
    display: flex;
    align-items: center;
  }
  .nav-tab:hover { color: var(--muted); }
  .nav-tab.active { color: #fff; border-bottom-color: var(--purple); }
  .nav-tab.active-gold { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── PANELS ── */
  .panel { display: none; flex: 1; overflow: hidden; }
  .panel.visible { display: flex; flex-direction: column; }

  /* ════════════════════════════════════════
     COPY WRITER PANEL
  ════════════════════════════════════════ */
  #cw-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left sidebar */
  #cw-sidebar {
    width: 270px;
    min-width: 270px;
    border-right: 1px solid var(--border);
    background: #0c0c1a;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .label {
    font-size: 9px;
    color: #444466;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  select, input {
    background: #141420;
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 11px;
    font-family: inherit;
    outline: none;
    width: 100%;
    cursor: pointer;
  }
  select:focus, input:focus { border-color: var(--purple); }

  .angle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: inherit;
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 6px;
    text-align: left;
    cursor: pointer;
    display: block;
    width: 100%;
    margin-bottom: 5px;
    transition: all 0.12s;
    letter-spacing: 0.3px;
  }
  .angle-btn:hover { border-color: var(--border2); color: var(--text); }
  .angle-btn.active {
    background: rgba(255,180,0,0.1);
    border-color: rgba(255,180,0,0.35);
    color: var(--gold);
    font-weight: 500;
  }

  /* Voice profile card */
  .profile-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .profile-row { margin-bottom: 9px; }
  .profile-row .label { margin-bottom: 2px; }
  .profile-val { font-size: 10px; color: #8888aa; line-height: 1.55; }
  .voice-warning {
    margin-top: 10px;
    padding: 8px;
    background: rgba(255,180,0,0.05);
    border: 1px solid rgba(255,180,0,0.18);
    border-radius: 5px;
    font-size: 10px;
    color: #887744;
    line-height: 1.55;
  }

  /* Right content */
  #cw-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .format-tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 22px;
  }
  .format-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .format-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0a0a16;
    font-weight: 700;
  }

  .formula-section { margin-bottom: 22px; }
  .formula-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; }

  .formula-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 15px;
    cursor: pointer;
    margin-bottom: 7px;
    transition: all 0.13s;
    font-size: 11px;
    color: #7777aa;
    line-height: 1.7;
    white-space: pre-wrap;
    position: relative;
  }
  .formula-card:hover { border-color: var(--border2); color: var(--muted); }
  .formula-card.selected {
    background: rgba(123,97,255,0.09);
    border-color: rgba(123,97,255,0.45);
    color: #d0ccff;
  }
  .formula-card.selected::after {
    content: '';
    position: absolute;
    top: 11px; right: 11px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--purple);
  }

  .selected-preview {
    font-size: 10px;
    color: var(--dim);
    margin-top: 6px;
    line-height: 1.6;
  }
  .selected-preview .highlight { color: var(--purple); }

  .copy-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 9px;
    font-family: inherit;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .copy-btn.copied {
    background: rgba(0,200,150,0.15);
    border-color: rgba(0,200,150,0.4);
    color: var(--green);
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .info-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    margin-top: 20px;
  }
  .info-box.gold {
    background: rgba(255,180,0,0.04);
    border-color: rgba(255,180,0,0.15);
  }
  .info-box .label { margin-bottom: 9px; }
  .info-box p {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.9;
  }
  .info-box.gold p { color: #887744; }
  .tag {
    display: inline-block;
    background: rgba(255,180,0,0.12);
    color: var(--gold);
    border: 1px solid rgba(255,180,0,0.25);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 9px;
    letter-spacing: 0.3px;
  }

  /* ════════════════════════════════════════
     CREATIVE OS PANEL
  ════════════════════════════════════════ */
  #cos-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Sub-tabs */
  #cos-tabs {
    display: flex;
    gap: 2px;
    padding: 0 28px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cos-tab {
    background: none;
    border: none;
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .cos-tab:hover { color: var(--muted); }
  .cos-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: 500; }

  #cos-content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* Brief table */
  .brief-controls {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .ctrl-group { display: flex; flex-direction: column; }
  .ctrl-group select, .ctrl-group input { min-width: 160px; }
  .stat-pill {
    background: rgba(123,97,255,0.1);
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 10px;
    color: var(--purple);
    letter-spacing: 1px;
    white-space: nowrap;
    align-self: flex-end;
  }

  .rule-box {
    background: rgba(123,97,255,0.06);
    border: 1px solid rgba(123,97,255,0.14);
    border-radius: 8px;
    padding: 11px 15px;
    margin-bottom: 18px;
    font-size: 11px;
    color: #8888bb;
    line-height: 1.6;
  }
  .rule-box strong { color: var(--purple); }

  .brief-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
  th {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--dim);
    text-transform: uppercase;
    text-align: left;
    padding: 0 8px 8px;
    font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 8px 7px;
    background: var(--bg3);
    border-top: 1px solid #1a1a33;
    border-bottom: 1px solid #1a1a33;
    font-size: 11px;
    color: #aaaacc;
    vertical-align: middle;
  }
  td:first-child { border-left: 1px solid #1a1a33; border-radius: 6px 0 0 6px; }
  td:last-child  { border-right: 1px solid #1a1a33; border-radius: 0 6px 6px 0; }
  td select, td input { border-radius: 5px; padding: 5px 8px; font-size: 11px; }

  .row-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .row-num.staple { background: rgba(123,97,255,0.12); border: 1px solid rgba(123,97,255,0.2); color: var(--purple); }
  .row-num.homerun { background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); color: var(--orange); }

  .del-btn {
    background: none; border: none; color: var(--border2);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 5px;
    transition: color 0.12s;
  }
  .del-btn:hover { color: var(--red); }

  .track-select-staple { color: var(--green) !important; border-color: rgba(0,200,150,0.3) !important; }
  .track-select-homerun { color: var(--orange) !important; border-color: rgba(245,166,35,0.4) !important; }

  .btn {
    background: transparent;
    border: 1px dashed var(--border2);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.12s;
  }
  .btn:hover { color: var(--text); border-color: var(--purple); }
  .btn.primary {
    background: rgba(123,97,255,0.14);
    border: 1px solid rgba(123,97,255,0.4);
    border-style: solid;
    color: var(--purple);
    font-weight: 700;
  }
  .btn.primary:hover { background: rgba(123,97,255,0.22); }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }

  /* Log & Tracker add forms */
  .add-form {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 22px;
  }
  .add-form-title { font-size: 10px; color: #5555aa; letter-spacing: 2px; margin-bottom: 13px; }
  .add-form-fields { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .add-form-fields .ctrl-group { flex: 1 1 130px; }
  .add-form-fields .ctrl-group.wide { flex: 2 1 200px; }
  .add-form-fields .ctrl-group select,
  .add-form-fields .ctrl-group input { min-width: unset; }

  .add-btn {
    background: var(--purple);
    border: none;
    color: #fff;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: 1px;
    font-weight: 700;
    cursor: pointer;
    align-self: flex-end;
    white-space: nowrap;
    transition: opacity 0.12s;
  }
  .add-btn:hover { opacity: 0.85; }

  /* Track badge */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge.staple { background: rgba(0,200,150,0.12); color: var(--green); border: 1px solid rgba(0,200,150,0.25); }
  .badge.homerun { background: rgba(245,166,35,0.15); color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }

  /* Status select colours */
  .status-running { color: var(--orange) !important; }
  .status-winner  { color: var(--green)  !important; }
  .status-retired { color: var(--red)    !important; }

  .empty-state {
    text-align: center;
    color: var(--border2);
    padding: 50px;
    font-size: 11px;
    letter-spacing: 1px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222244; border-radius: 3px; }
</style>
</head>

<div id="app-shell">

    <div class="nav-brand">

      <div id="cos-content"></div>
    </div>
  </div>

</div>

function currentWeek() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  return `W${Math.ceil((now - start) / 604800000)}`;
}
function defaultBriefRows() {
  return Array.from({length:5}, (_,i) => ({
    id: Date.now()+i, angle:'', proof:'', format:'', track:'Staple', hook:'', visual:''
  }));
}

function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
  document.getElementById(`panel-${name}`).classList.add('visible');
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.remove('active','active-gold');

function cwInit() {
  // Populate client select
  const sel = document.getElementById('cw-client');
  CLIENTS.forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    sel.appendChild(o);
  });
  sel.value = cwState.client;
  sel.onchange = () => { cwState.client = sel.value; cwRender(); };

  // Angle buttons
  const ang = document.getElementById('cw-angles');
  ANGLES.forEach(a => {
    const b = document.createElement('button');
    b.className = 'angle-btn' + (a === cwState.angle ? ' active' : '');
    b.textContent = a;
    b.onclick = () => { cwState.angle = a; cwRender(); };
    ang.appendChild(b);
  });

  cwRender();
}

function cwSetFormat(i) {
  cwState.format = i;
  document.querySelectorAll('.format-tab').forEach((b,j) => {
    b.classList.toggle('active', i===j);
  });
  cwRenderFormulas();
}

function cwRender() {
  // Angle buttons
  document.querySelectorAll('.angle-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cwState.angle);
  });
  // Profile
  const p = CLIENT_PROFILES[cwState.client];
  const rows = [
    ['TYPE', p.type], ['TONE', p.tone], ['AUDIENCE', p.audience],
    ['FEAR CORE', p.fearCore], ['DESIRE CORE', p.desireCore],
    ['PROOF', p.proofAssets], ['CTA OFFER', p.ctaOffer],
  ];
  document.getElementById('cw-profile').innerHTML =
    rows.map(([l,v]) => `<div class="profile-row"><div class="label">${l}</div><div class="profile-val">${v}</div></div>`).join('') +
    `<div class="voice-warning">${p.voiceNotes}</div>`;
  cwRenderFormulas();
}

function cwRenderFormulas() {
  const f = FORMULAS[cwState.angle];
  const fmt = cwState.format;
  const container = document.getElementById('cw-formulas');
  container.innerHTML = '';

  if (fmt === 0) {
    // Static: headline + body
    container.appendChild(cwSection('HEADLINE FORMULAS', f.headline, 'headline'));
    const div = document.createElement('div');
    div.className = 'divider'; container.appendChild(div);
    container.appendChild(cwSection('BODY COPY FORMULAS (1–2 lines)', f.body, 'body'));
    container.appendChild(cwInfoBox([
      '1. Pick a headline formula above',
      '2. Pick a body formula',
      '3. Replace <span class="tag">[BRACKETS]</span> with client-specific details',
      '4. Keep headline under 8 words',
      '5. Body = 1 sentence max on static. Every word earns its place.',
    ], false));
  } else if (fmt === 1) {
    container.appendChild(cwSection('CAPTION FORMULAS (PRIMARY TEXT)', f.caption, 'caption'));
    container.appendChild(cwInfoBox([
      '• First line = hook. Must work without the image.',
      '• Short paragraphs. White space is not wasted space.',

      '• One CTA only. Don\'t give them two things to do.',
      '• Replace <span class="tag">[BRACKETS]</span> with real specifics — fake specificity kills trust.',
    ], false));

    container.appendChild(cwSection('SCRIPT STRUCTURE', f.script, 'script'));
    container.appendChild(cwInfoBox([
      'Hook → 0–3 sec. One sentence. Pattern interrupt.',
      'Body → 3–12 sec. Proof or mechanism. No waffle.',
      'CTA → 12–15 sec. One action. Clear and direct.',
      '',
      'Total target: 15 sec. Hard cap: 30 sec for cold audiences.',
    ], true));
    container.appendChild(cwInfoBox([
      '• Write how people speak — read it aloud before using it.',
      '• Hook must work as text overlay AND spoken word.',
      '• Body: one idea only. Not a feature list.',
      '• CTA: verb first. "Book", "Click", "DM us".',
      '• Replace <span class="tag">[BRACKETS]</span> with real details — never leave a placeholder live.',
    ], false));
  }
}

function cwSection(title, items, key) {
  const wrap = document.createElement('div');
  wrap.className = 'formula-section';

  const hdr = document.createElement('div');
  hdr.className = 'formula-header';
  hdr.innerHTML = `<div class="section-label">${title}</div>`;
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.id = `copy-btn-${key}`;
  btn.textContent = 'COPY';
  btn.onclick = () => cwCopy(items[cwState.selected[key]], key);
  hdr.appendChild(btn);
  wrap.appendChild(hdr);

  items.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'formula-card' + (cwState.selected[key]===i ? ' selected' : '');
    card.textContent = text;
    card.onclick = () => {
      cwState.selected[key] = i;
      cwRenderFormulas();
    };
    wrap.appendChild(card);
  });

  if (key === 'headline') {
    const prev = document.createElement('div');
    prev.className = 'selected-preview';
    prev.innerHTML = 'Selected: <span class="highlight">' + cwHighlight(items[cwState.selected[key]]) + '</span>';
    wrap.appendChild(prev);
  }
  return wrap;
}

function cwHighlight(text) {
  return text.replace(/\[[^\]]+\]/g, m => `<span class="tag">${m}</span>`);
}

function cwCopy(text, id) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  const btn = document.getElementById(`copy-btn-${id}`);
  if (btn) { btn.textContent = 'COPIED'; btn.classList.add('copied'); }
  setTimeout(() => {
    if (btn) { btn.textContent = 'COPY'; btn.classList.remove('copied'); }
  }, 1800);
}

function cwInfoBox(lines, gold) {
  const box = document.createElement('div');
  box.className = 'info-box' + (gold ? ' gold' : '');
  box.innerHTML = `<p>${lines.filter(Boolean).join('<br>')}</p>`;
  return box;
}

      (tab === 'tracker' && b.textContent.toLowerCase().includes('perf')) ||
      (tab === 'brief'   && b.textContent.toLowerCase().includes('brief')) ||
      (tab === 'log'     && b.textContent.toLowerCase().includes('log')));
  });
  // simpler: match by onclick attr pattern
  document.querySelectorAll('.cos-tab').forEach(b => {
    const match = b.getAttribute('onclick').includes(`'${tab}'`);
    b.classList.toggle('active', match);
  });
  cosRender();
}

    <option value="">Select...</option>
    ${options.map(o => `<option${o===current?' selected':''}>${o}</option>`).join('')}
  </select>`;
}

        angle: row.angle, proof: row.proof, format: row.format,
        track: row.track, note: row.hook,

}

    <div class="add-form-fields">
      <div class="ctrl-group"><div class="label">Client</div><select id="tr-client">${CLIENTS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="ctrl-group"><div class="label">Week</div><select id="tr-week" style="min-width:80px">${WEEKS.map(w=>`<option${w===s.week?' selected':''}>${w}</option>`).join('')}</select></div>
      <div class="ctrl-group"><div class="label">Angle</div><select id="tr-angle"><option value="">Select...</option>${ALL_ANGLES.map(a=>`<option>${a}</option>`).join('')}</select></div>
      <div class="ctrl-group"><div class="label">Format</div><select id="tr-format"><option value="">Select...</option>${ALL_FORMATS.map(f=>`<option>${f}</option>`).join('')}</select></div>
      <div class="ctrl-group"><div class="label">CPL (S$)</div><input id="tr-cpl" placeholder="e.g. 18"></div>
      <div class="ctrl-group"><div class="label">Enquiries</div><input id="tr-enq" placeholder="e.g. 5"></div>
      <div class="ctrl-group"><div class="label">Status</div><select id="tr-status">${PERF_STATUSES.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="ctrl-group wide"><div class="label">Notes</div><input id="tr-notes" placeholder="What worked / what didn't..."></div>
      <button class="add-btn" onclick="cosAddTrackerEntry()">LOG</button>
    </div>`;
  wrap.appendChild(form);

  if (!cosState.tracker.entries.length) {
    wrap.innerHTML += `<div class="empty-state">NO PERFORMANCE DATA YET — LOG YOUR FIRST ENTRY ABOVE</div>`;
    return wrap;
  }

  const tableWrap = document.createElement('div');
  tableWrap.style.overflowX = 'auto';
  const table = document.createElement('table');
  table.innerHTML = `<thead><tr><th>Client</th><th>Week</th><th>Angle</th><th>Format</th><th>CPL</th><th>Enquiries</th><th>Status</th><th>Notes</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  cosState.tracker.entries.forEach(e => {
    const statusClass = e.status === 'Winner → Staple' ? 'status-winner' : e.status === 'Retired' ? 'status-retired' : 'status-running';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${e.client}</td><td>${e.week}</td><td>${e.angle}</td><td>${e.format}</td>
      <td style="color:var(--orange);font-weight:700">${e.cpl?'S$'+e.cpl:'—'}</td>
      <td style="color:var(--green);font-weight:700">${e.enquiries||'—'}</td>
      <td><select class="${statusClass}" onchange="cosUpdateStatus(${e.id},this.value)">${PERF_STATUSES.map(p=>`<option${p===e.status?' selected':''}>${p}</option>`).join('')}</select></td>
      <td style="color:var(--dim)">${e.notes||'—'}</td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);
  return wrap;
}

function cosAddTrackerEntry() {
  const angle = document.getElementById('tr-angle').value;
  const format = document.getElementById('tr-format').value;
  if (!angle || !format) return;
  cosState.tracker.entries.unshift({
    id: uid(),
    client:    document.getElementById('tr-client').value,
    week:      document.getElementById('tr-week').value,
    angle, format,
    status:    document.getElementById('tr-status').value,
    cpl:       document.getElementById('tr-cpl').value,
    enquiries: document.getElementById('tr-enq').value,
    notes:     document.getElementById('tr-notes').value,
  });
  cosRender();
}

function cosUpdateStatus(id, status) {
  const e = cosState.tracker.entries.find(e => e.id === id);
  if (e) e.status = status;
}

// ── UTILS ──
function esc(str) {
  return (str||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
cwInit();
cosRender();
</script>
</body>
</html>
