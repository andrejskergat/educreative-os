<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCreative AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }
  header { padding: 24px 32px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  header span { font-size: 12px; background: #7c3aed; color: #fff; padding: 2px 8px; border-radius: 999px; }
  .container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
  .input-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px; margin-bottom: 32px; }
  .input-card h2 { font-size: 15px; color: #aaa; margin-bottom: 16px; font-weight: 500; }
  textarea { width: 100%; background: #0f0f13; border: 1px solid #333; border-radius: 10px; color: #fff; padding: 14px 16px; font-size: 15px; resize: none; height: 80px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: #7c3aed; }
  .btn { background: #7c3aed; color: #fff; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 12px; }
  .btn:hover { background: #6d28d9; }
  .btn:disabled { background: #444; cursor: not-allowed; }
  .jobs-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .job-card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px 24px; margin-bottom: 12px; }
  .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .job-topic { font-size: 15px; font-weight: 500; color: #fff; flex: 1; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
  .badge-queued { background: #333; color: #aaa; }
  .badge-done { background: #14532d; color: #4ade80; }
  .badge-error { background: #450a0a; color: #f87171; }
  .badge-running { background: #1e1b4b; color: #a78bfa; }
  .progress { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .step { font-size: 12px; padding: 4px 10px; border-radius: 6px; background: #111; color: #555; border: 1px solid #222; }
  .step.active { background: #1e1b4b; color: #a78bfa; border-color: #4c1d95; }
  .step.done { background: #14532d; color: #4ade80; border-color: #166534; }
  .job-meta { font-size: 12px; color: #555; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .action-btn { font-size: 12px; padding: 6px 14px; border-radius: 7px; border: 1px solid #333; background: #111; color: #aaa; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .action-btn:hover { border-color: #7c3aed; color: #c4b5fd; }
  .output-section { margin-top: 16px; border-top: 1px solid #222; padding-top: 16px; }
  .output-text { font-size: 13px; color: #ccc; white-space: pre-wrap; background: #0f0f13; border-radius: 8px; padding: 12px; border: 1px solid #222; max-height: 400px; overflow-y: auto; line-height: 1.6; user-select: text; cursor: text; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab { font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px solid #222; background: #111; color: #666; }
  .tab.active { background: #1e1b4b; color: #a78bfa; border-color: #4c1d95; }
  .empty { text-align: center; padding: 48px; color: #444; font-size: 14px; }
  .settings-toggle { font-size: 12px; color: #666; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-top: 16px; user-select: none; }
  .settings-toggle:hover { color: #a78bfa; }
  .settings-panel { display: none; margin-top: 16px; border-top: 1px solid #222; padding-top: 16px; }
  .settings-panel.open { display: block; }
  .agent-setting { margin-bottom: 16px; }
  .agent-setting label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; font-weight: 500; }
  .agent-setting small { font-size: 11px; color: #555; display: block; margin-bottom: 6px; }
  .agent-setting textarea { height: 60px; font-size: 13px; }
  .thumbnail-img { width: 100%; max-width: 220px; border-radius: 8px; border: 1px solid #333; margin-bottom: 12px; display: block; }
  .copy-btn { font-size: 11px; padding: 3px 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #888; cursor: pointer; float: right; margin-bottom: 6px; }
  .copy-btn:hover { border-color: #7c3aed; color: #c4b5fd; }
  .copy-btn.copied { border-color: #166534; color: #4ade80; }
</style>
</head>
<body>
<header>
  <h1>EduCreative AI</h1>
  <span>YouTube Shorts Pipeline</span>
</header>
<div class="container">
  <div class="input-card">
    <h2>What do you want to create today?</h2>
    <textarea id="topicInput" placeholder="e.g. Traditional education business vs AI education business"></textarea>
    <div class="settings-toggle" onclick="toggleSettings()">
      <span id="settingsArrow">&#9658;</span> Agent Settings (optional)
    </div>
    <div class="settings-panel" id="settingsPanel">
      <div class="agent-setting">
        <label>Script Writer - Extra Context</label>
        <small>Brand voice, audience, hooks to avoid, style preferences</small>
        <textarea id="scriptContext" placeholder="e.g. Audience: edtech founders 28-45. Open with a shocking stat. Never use 'game-changer'."></textarea>
      </div>
      <div class="agent-setting">
        <label>Thumbnail Designer - Extra Context</label>
        <small>Brand colours, style, fonts, examples to follow or avoid</small>
        <textarea id="thumbnailContext" placeholder="e.g. Brand colours: purple #7c3aed and white. Bold sans-serif. Always split-screen."></textarea>
      </div>
    </div>
    <button class="btn" onclick="submitJob()">Generate Content</button>
  </div>
  <div class="jobs-title">Recent Jobs</div>
  <div id="jobsList"></div>
</div>

<script>
const STEPS = ["YouTube Research", "Script", "Thumbnail", "Description"];
const STATUS_STEPS = { queued: -1, researching: 0, scripting: 1, thumbnail: 2, description: 3, done: 4, error: -2 };
let jobs = {};
let activeStreams = new Set();

function toggleSettings() {
  const panel = document.getElementById("settingsPanel");
  const arrow = document.getElementById("settingsArrow");
  panel.classList.toggle("open");
  arrow.innerHTML = panel.classList.contains("open") ? "&#9660;" : "&#9658;";
}

async function submitJob() {
  const topic = document.getElementById("topicInput").value.trim();
  if (!topic) return;
  const script_context = document.getElementById("scriptContext").value.trim();
  const thumbnail_context = document.getElementById("thumbnailContext").value.trim();
  document.querySelector(".btn").disabled = true;
  const res = await fetch("/jobs", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({topic, script_context, thumbnail_context}) });
  const data = await res.json();
  document.getElementById("topicInput").value = "";
  document.querySelector(".btn").disabled = false;
  const job = await (await fetch(`/jobs/${data.job_id}`)).json();
  jobs[job.id] = job;
  renderJobs(Object.values(jobs).sort((a,b) => b.created_at.localeCompare(a.created_at)));
  streamJob(data.job_id);
}

function streamJob(jobId) {
  if (activeStreams.has(jobId)) return;
  activeStreams.add(jobId);
  const es = new EventSource(`/jobs/${jobId}/stream`);
  es.addEventListener("progress", () => updateJobCard(jobId));
  es.addEventListener("done", () => { es.close(); activeStreams.delete(jobId); updateJobCard(jobId); });
  es.addEventListener("error", () => { es.close(); activeStreams.delete(jobId); updateJobCard(jobId); });
}

async function loadJobs() {
  const res = await fetch("/jobs");
  const data = await res.json();
  // Only update cards that are not done — avoid disturbing completed ones user is reading
  data.forEach(j => {
    if (!jobs[j.id] || jobs[j.id].status !== "done") {
      jobs[j.id] = j;
      if (j.status !== "done" && j.status !== "error") streamJob(j.id);
    }
  });
  renderJobs(data);
}

async function updateJobCard(jobId) {
  const res = await fetch(`/jobs/${jobId}`);
  const job = await res.json();
  jobs[jobId] = job;
  const el = document.getElementById(`job-${jobId}`);
  if (el) {
    const scroll = window.scrollY;
    el.outerHTML = renderJob(job);
    window.scrollTo(0, scroll);
  }
}

function renderJobs(jobList) {
  const el = document.getElementById("jobsList");
  const scroll = window.scrollY;
  if (!jobList.length) { el.innerHTML = '<div class="empty">No jobs yet. Type a topic above to get started.</div>'; return; }
  el.innerHTML = jobList.map(renderJob).join("");
  window.scrollTo(0, scroll);
}

function copyText(id, btn) {
  const el = document.getElementById(id);
  navigator.clipboard.writeText(el.innerText).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  });
}

function renderJob(job) {
  const stepIdx = STATUS_STEPS[job.status] ?? -1;
  const badgeClass = job.status === "done" ? "badge-done" : job.status === "error" ? "badge-error" : stepIdx >= 0 ? "badge-running" : "badge-queued";
  const badgeLabel = job.status === "done" ? "Complete" : job.status === "error" ? "Error" : job.status === "queued" ? "Queued" : "Running...";
  const date = new Date(job.created_at).toLocaleString();
  const steps = STEPS.map((s, i) => {
    const cls = i < stepIdx ? "done" : i === stepIdx ? "active" : "";
    return `<div class="step ${cls}">${i < stepIdx ? "&#10003; " : ""}${s}</div>`;
  }).join("");

  let outputs = "";
  if (job.status === "done") {
    const thumbImg = job.thumbnail_url ? `<img src="${job.thumbnail_url}" class="thumbnail-img" alt="Thumbnail" /><br>` : "";
    outputs = `
      <div class="output-section">
        <div class="tabs">
          <div class="tab active" onclick="showTab(this,'${job.id}','script')">Script</div>
          <div class="tab" onclick="showTab(this,'${job.id}','thumbnail')">Thumbnail</div>
          <div class="tab" onclick="showTab(this,'${job.id}','description')">Description</div>
        </div>
        <div id="tab-${job.id}-script">
          <button class="copy-btn" onclick="copyText('script-text-${job.id}', this)">Copy</button>
          <div id="script-text-${job.id}" class="output-text">${escHtml(job.script || "")}</div>
        </div>
        <div id="tab-${job.id}-thumbnail" style="display:none">
          ${thumbImg}
          <button class="copy-btn" onclick="copyText('thumb-text-${job.id}', this)">Copy</button>
          <div id="thumb-text-${job.id}" class="output-text">${escHtml(job.thumbnail || "")}</div>
        </div>
        <div id="tab-${job.id}-description" style="display:none">
          <button class="copy-btn" onclick="copyText('desc-text-${job.id}', this)">Copy</button>
          <div id="desc-text-${job.id}" class="output-text">${escHtml(job.description || "")}</div>
        </div>
      </div>
      <div class="actions">
        <a class="action-btn" href="/outputs/${job.id}.txt" download>Download All</a>
        ${job.canva_url ? `<a class="action-btn" href="${escHtml(job.canva_url)}" target="_blank" style="border-color:#7c3aed;color:#c4b5fd;">Open in Canva &#8599;</a>` : ""}
      </div>`;
  }

  return `<div class="job-card" id="job-${job.id}">
    <div class="job-header"><div class="job-topic">${escHtml(job.topic)}</div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
    <div class="progress">${steps}</div>
    <div class="job-meta">${date} &middot; ID: ${job.id}</div>
    ${outputs}
  </div>`;
}

function showTab(el, jobId, tab) {
  el.closest('.output-section').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['script','thumbnail','description'].forEach(t => {
    document.getElementById(`tab-${jobId}-${t}`).style.display = t === tab ? 'block' : 'none';
  });
}

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

loadJobs();
// Only poll for running jobs, not on a fixed interval that disrupts reading
setInterval(() => {
  const hasRunning = Object.values(jobs).some(j => j.status !== "done" && j.status !== "error");
  if (hasRunning) loadJobs();
}, 3000);
</script>
</body>
</html>
