<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduCreative — Script Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; }

header { padding: 18px 32px; border-bottom: 1px solid #e2e4e9; background: #fff; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 18px; font-weight: 700; color: #1a1a2e; }
header span { font-size: 11px; background: #7c3aed; color: #fff; padding: 2px 10px; border-radius: 999px; font-weight: 600; }

.container { max-width: 780px; margin: 0 auto; padding: 36px 24px; }

/* Step cards */
.step-card {
  background: #fff;
  border: 1px solid #e2e4e9;
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.step-label {
  font-size: 11px;
  font-weight: 700;
  color: #7c3aed;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 10px;
}
.step-title {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 16px;
}

/* Input */
.topic-input {
  width: 100%;
  background: #f9fafb;
  border: 1.5px solid #e2e4e9;
  border-radius: 10px;
  color: #1a1a2e;
  padding: 14px 16px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
  height: 72px;
}
.topic-input:focus { border-color: #7c3aed; background: #fff; }

/* Buttons */
.btn {
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { background: #6d28d9; }
.btn:disabled { background: #c4b5fd; cursor: not-allowed; }
.btn-outline {
  background: transparent;
  border: 1.5px solid #7c3aed;
  color: #7c3aed;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn-outline:hover { background: #faf5ff; }

/* Loading */
.loader {
  display: none;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
  font-size: 14px;
  color: #7c3aed;
}
.loader.show { display: flex; }
.spinner {
  width: 18px; height: 18px;
  border: 2px solid #e9d5ff;
  border-top-color: #7c3aed;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Hook list */
.hooks-section { display: none; margin-top: 6px; }
.hooks-section.show { display: block; }
.hooks-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.hook-card {
  border: 1.5px solid #e2e4e9;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  line-height: 1.55;
  color: #1a1a2e;
  background: #f9fafb;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.hook-card:hover { border-color: #7c3aed; background: #faf5ff; }
.hook-card.selected { border-color: #7c3aed; background: #faf5ff; box-shadow: 0 0 0 3px #ede9fe; }
.hook-num { font-size: 11px; font-weight: 700; color: #c4b5fd; min-width: 18px; margin-top: 2px; }
.hook-text { flex: 1; }
.hook-check { font-size: 16px; color: #7c3aed; display: none; }
.hook-card.selected .hook-check { display: block; }

/* Selected hook display */
.selected-hook-box {
  background: #faf5ff;
  border: 2px solid #7c3aed;
  border-radius: 10px;
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  color: #3b0764;
  line-height: 1.55;
  margin-bottom: 16px;
}
.selected-hook-label {
  font-size: 10px;
  font-weight: 700;
  color: #7c3aed;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

/* Script output */
.script-section { display: none; }
.script-section.show { display: block; }
.script-box {
  background: #f9fafb;
  border: 1.5px solid #e2e4e9;
  border-radius: 10px;
  padding: 20px;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  color: #1a1a2e;
  max-height: 520px;
  overflow-y: auto;
  user-select: text;
  cursor: text;
}
.script-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.copy-btn {
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 8px;
  border: 1.5px solid #e2e4e9;
  background: #f4f5f7;
  color: #555;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all 0.15s;
}
.copy-btn:hover { border-color: #7c3aed; color: #7c3aed; }
.copy-btn.copied { border-color: #16a34a; color: #16a34a; background: #dcfce7; }

/* Topic suggestion */
.topic-suggestion {
  font-size: 12px;
  color: #aaa;
  margin-top: 8px;
}
.topic-suggestion span {
  color: #7c3aed;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* Step 2 locked state */
.step-card.locked { opacity: 0.45; pointer-events: none; }
.step-card.locked .step-label { color: #bbb; }
</style>
</head>
<body>

<header>
  <h1>EduCreative AI</h1>
  <span>Script Generator</span>
</header>

<div class="container">

  <!-- STEP 1: Research + Hooks -->
  <div class="step-card" id="step1">
    <div class="step-label">Step 1</div>
    <div class="step-title">Enter a topic — or leave blank for today's auto-topic</div>

    <textarea class="topic-input" id="topicInput"
      placeholder="e.g. Why your education ads get clicks but zero enrolments&#10;Leave blank to use today's auto-topic from the bank"></textarea>

    <div class="topic-suggestion" id="topicHint"></div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <button class="btn" id="researchBtn" onclick="doResearch()">
        <span>Research &amp; Suggest Hooks</span>
      </button>
    </div>

    <div class="loader" id="researchLoader">
      <div class="spinner"></div>
      <span id="researchLoaderMsg">Researching topic and generating hooks...</span>
    </div>

    <!-- Hook results -->
    <div class="hooks-section" id="hooksSection">
      <div style="margin-top:20px; margin-bottom:10px; font-size:13px; color:#666;">
        Pick the hook that hits hardest — then click <strong>Write Script</strong> below.
      </div>
      <div class="hooks-grid" id="hooksGrid"></div>
      <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button class="btn" id="writeBtn" onclick="doWrite()" disabled>Write Script with this Hook</button>
        <button class="btn-outline" onclick="doResearch()">Regenerate Hooks</button>
      </div>
    </div>
  </div>

  <!-- STEP 2: Script -->
  <div class="step-card locked" id="step2">
    <div class="step-label">Step 2</div>
    <div class="step-title">Your Script</div>

    <div class="loader" id="writeLoader">
      <div class="spinner"></div>
      <span>Writing your script...</span>
    </div>

    <div class="script-section" id="scriptSection">
      <div class="selected-hook-label">Hook used</div>
      <div class="selected-hook-box" id="hookUsed"></div>
      <div class="script-box" id="scriptBox"></div>
      <div class="script-actions">
        <button class="copy-btn" id="copyBtn" onclick="copyScript()">Copy Script</button>
        <button class="btn-outline" onclick="resetAll()" style="font-size:13px;padding:8px 18px;">Start Over</button>
      </div>
    </div>
  </div>

</div>

<script>
let currentTopic = "";
let selectedHook = null;

// Load today's topic hint
async function loadTodayTopic() {
  try {
    const res = await fetch("/topics");
    const data = await res.json();
    const hint = document.getElementById("topicHint");
    hint.innerHTML = `Today's auto-topic: <span onclick="useTopic('${escAttr(data.today)}')">${escHtml(data.today)}</span>`;
  } catch(e) {}
}

function useTopic(topic) {
  document.getElementById("topicInput").value = topic;
}

async function doResearch() {
  const topic = document.getElementById("topicInput").value.trim();
  const btn = document.getElementById("researchBtn");
  const loader = document.getElementById("researchLoader");
  const hooksSection = document.getElementById("hooksSection");

  btn.disabled = true;
  loader.classList.add("show");
  hooksSection.classList.remove("show");
  selectedHook = null;
  document.getElementById("writeBtn").disabled = true;
  document.getElementById("step2").classList.add("locked");
  document.getElementById("scriptSection").classList.remove("show");
  document.getElementById("writeLoader").classList.remove("show");

  try {
    const res = await fetch("/research", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({topic}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    currentTopic = data.topic;
    document.getElementById("topicInput").value = data.topic;
    renderHooks(data.hooks);
    hooksSection.classList.add("show");
  } catch(e) {
    alert("Research failed: " + e.message);
  } finally {
    btn.disabled = false;
    loader.classList.remove("show");
  }
}

function renderHooks(hooks) {
  const grid = document.getElementById("hooksGrid");
  grid.innerHTML = hooks.map((h, i) => `
    <div class="hook-card" id="hook-${i}" onclick="selectHook(${i}, this)">
      <span class="hook-num">${i + 1}</span>
      <span class="hook-text">${escHtml(h)}</span>
      <span class="hook-check">&#10003;</span>
    </div>
  `).join("");
  // Store hooks on the grid element
  grid._hooks = hooks;
}

function selectHook(idx, el) {
  document.querySelectorAll(".hook-card").forEach(c => c.classList.remove("selected"));
  el.classList.add("selected");
  selectedHook = document.getElementById("hooksGrid")._hooks[idx];
  document.getElementById("writeBtn").disabled = false;
}

async function doWrite() {
  if (!selectedHook || !currentTopic) return;

  const btn = document.getElementById("writeBtn");
  const step2 = document.getElementById("step2");
  const loader = document.getElementById("writeLoader");
  const scriptSection = document.getElementById("scriptSection");

  btn.disabled = true;
  step2.classList.remove("locked");
  loader.classList.add("show");
  scriptSection.classList.remove("show");

  // Scroll to step 2
  step2.scrollIntoView({behavior: "smooth", block: "start"});

  try {
    const res = await fetch("/write", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({topic: currentTopic, hook: selectedHook}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById("hookUsed").textContent = selectedHook;
    document.getElementById("scriptBox").textContent = data.script;
    scriptSection.classList.add("show");
  } catch(e) {
    alert("Write failed: " + e.message);
    step2.classList.add("locked");
  } finally {
    loader.classList.remove("show");
    btn.disabled = false;
  }
}

function copyScript() {
  const text = document.getElementById("scriptBox").textContent;
  const btn = document.getElementById("copyBtn");
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy Script"; btn.classList.remove("copied"); }, 2000);
  });
}

function resetAll() {
  document.getElementById("topicInput").value = "";
  document.getElementById("hooksSection").classList.remove("show");
  document.getElementById("scriptSection").classList.remove("show");
  document.getElementById("writeLoader").classList.remove("show");
  document.getElementById("step2").classList.add("locked");
  document.getElementById("writeBtn").disabled = true;
  selectedHook = null;
  currentTopic = "";
  window.scrollTo({top: 0, behavior: "smooth"});
}

function escHtml(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) {
  return (s||"").replace(/'/g,"\\'");
}

loadTodayTopic();
</script>
</body>
</html>
